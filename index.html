<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Star | Fashion Dress-Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcce5;
            --primary-dark: #ff99cc;
            --secondary: #e5ccff;
            --accent: #ccffff;
            --gold: #ffd700;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.75);
            --shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            width: 100%;
            max-width: 1150px;
            height: 95vh;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            font-weight: 800;
            color: var(--dark);
            border: 1px solid white;
        }

        .coin-icon {
            color: var(--gold);
            margin-right: 10px;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }

        /* Scenes */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scene.active {
            display: flex;
            opacity: 1;
        }

        /* Menu Scene */
        #scene-menu {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('assets/background.png') center/cover no-repeat;
        }

        .title-card {
            background: var(--glass);
            padding: 60px;
            border-radius: 50px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: float 4s ease-in-out infinite;
            border: 1px solid rgba(255,255,255,0.8);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 5rem;
            background: linear-gradient(to right, #ff4d94, #9933ff, #ff99cc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: -3px;
            font-weight: 800;
        }

        .btn-play {
            padding: 20px 60px;
            font-size: 1.5rem;
            color: white;
            background: linear-gradient(135deg, #ff99cc, #cc99ff);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(255, 153, 204, 0.5);
            text-transform: uppercase;
        }

        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 102, 178, 0.6);
        }

        /* Closet Scene */
        #scene-closet {
            flex-direction: row;
        }

        .closet-left {
            flex: 1.4;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 80%);
            padding: 20px;
        }

        .avatar-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-layer {
            position: absolute;
            max-width: 90%;
            max-height: 98%;
            width: auto;
            height: auto;
            object-fit: contain;
            pointer-events: none;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15));
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .closet-right {
            width: 480px;
            background: var(--glass);
            border-left: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            box-shadow: -15px 0 40px rgba(0,0,0,0.08);
        }

        .tabs {
            display: flex;
            padding: 20px;
            gap: 10px;
            background: rgba(0, 0, 0, 0.04);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 14px 24px;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: 800;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
            white-space: nowrap;
            color: #888;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab.active {
            background: #ff99cc;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 153, 204, 0.3);
            transform: translateY(-3px);
        }

        .inventory-grid {
            flex: 1;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            overflow-y: auto;
            align-content: start;
        }

        .item-card {
            background: white;
            border-radius: 25px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
            position: relative;
            padding: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .item-card:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .item-card.selected {
            border-color: var(--primary-dark);
            background: #fffafa;
        }

        .item-card img {
            width: 95%;
            height: 95%;
            object-fit: contain;
        }

        .item-card.locked::after {
            content: '💎';
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 1rem;
        }

        .item-price {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--gold);
            margin-top: 5px;
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .action-bar {
            display: flex;
            padding: 0 30px;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.8);
            background: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-action:hover { background: #fdfdfd; transform: translateY(-2px); }

        .closet-footer {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-finish {
            width: 100%;
            padding: 22px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(90deg, #cc99ff, #ff99cc);
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 15px 30px rgba(255, 153, 204, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-finish:hover {
            box-shadow: 0 20px 40px rgba(255, 153, 204, 0.5);
            transform: scale(1.02);
        }

        /* Photo Scene */
        #scene-photo {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .photo-wrapper {
            position: relative;
            padding: 50px;
            background: #fff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            border-radius: 40px;
            background: linear-gradient(135deg, #fff, #fefefe);
        }

        .photo-canvas {
            width: 500px;
            height: 700px;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 12px solid white;
            box-shadow: inset 0 0 50px rgba(255,255,255,0.5);
        }

        .social-ui {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 25px;
            z-index: 100;
        }

        .social-btn {
            background: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .social-btn:hover { transform: scale(1.1); }

        .btn-post {
            margin-top: 50px;
            padding: 22px 100px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* Modal */
        #modal-reward {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 60px;
            border-radius: 50px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        }

        @keyframes popIn {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .score-box {
            font-size: 5rem;
            font-weight: 950;
            color: #ff4d94;
            margin: 30px 0;
            text-shadow: 4px 4px 0 rgba(255, 153, 204, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Responsive */
        @media (max-width: 1000px) {
            #game-container {
                height: 100vh;
                border-radius: 0;
            }
            .closet-right { width: 400px; }
        }

        @media (max-width: 800px) {
            #scene-closet { flex-direction: column; }
            .closet-left { height: 50%; }
            .closet-right {
                width: 100%;
                height: 50%;
                border-left: none;
                border-top: 1px solid white;
            }
            .inventory-grid { grid-template-columns: repeat(4, 1fr); }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <span class="coin-icon">✨</span>
            <span id="score-display">100</span>
        </div>

        <!-- Menu Scene -->
        <div id="scene-menu" class="scene active">
            <div class="title-card">
                <h1>Pop Star</h1>
                <p style="margin-bottom: 35px; font-weight: 600; font-size: 1.2rem; color: #666; letter-spacing: 0.5px;">Seu estilo, sua música, seu sucesso!</p>
                <button class="btn-play" onclick="changeScene('scene-closet')">Jogar Agora</button>
            </div>
        </div>

        <!-- Closet Scene -->
        <div id="scene-closet" class="scene">
            <div class="closet-left">
                <div class="avatar-container" id="closet-avatar">
                    <!-- Doll Base -->
                    <img src="assets/avatar_base.png" class="avatar-layer" style="z-index: 1;" id="base-body">
                    
                    <!-- Dressing Layers -->
                    <img id="layer-shoes" src="" class="avatar-layer" style="z-index: 3; display:none;">
                    <img id="layer-dress" src="" class="avatar-layer" style="z-index: 5; display:none;">
                    <img id="layer-hair" src="" class="avatar-layer" style="z-index: 10; display:none;">
                    <img id="layer-acc" src="" class="avatar-layer" style="z-index: 15; display:none;">
                </div>
            </div>
            <div class="closet-right">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('hair')">CABELO</button>
                    <button class="tab" onclick="switchTab('dress')">ROUPAS</button>
                    <button class="tab" onclick="switchTab('shoes')">SAPATOS</button>
                    <button class="tab" onclick="switchTab('acc')">ACESSÓRIOS</button>
                </div>
                
                <div class="inventory-grid" id="inventory-grid">
                    <!-- Injected by JS -->
                </div>

                <div class="action-bar">
                    <button class="btn-action" onclick="randomizeLook()">🎲 Aleatório</button>
                    <button class="btn-action" onclick="clearLook()">🔄 Limpar</button>
                </div>

                <div class="closet-footer">
                    <button class="btn-finish" onclick="finalizeLook()">Finalizar Look</button>
                </div>
            </div>
        </div>

        <!-- Photo Scene -->
        <div id="scene-photo" class="scene">
            <div class="photo-wrapper">
                <div class="photo-canvas" id="photo-canvas">
                    <!-- Photo Content Injected by JS -->
                    <div class="social-ui">
                        <div class="social-btn">❤️</div>
                        <div class="social-btn">💬</div>
                        <div class="social-btn">✈️</div>
                    </div>
                </div>
            </div>
            <button class="btn-post" onclick="postLook()">Postar Look</button>
            <button class="btn-back" onclick="changeScene('scene-closet')" style="margin-top: 15px; background: transparent; border: none; cursor: pointer; color: #999; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Voltar e Editar</button>
        </div>
    </div>

    <!-- Reward Modal -->
    <div id="modal-reward">
        <div class="modal-content">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Vogue Ícone! 🌟</h2>
            <p style="color: #888; font-size: 1.1rem;">Seu estilo quebrou a internet hoje!</p>
            <div class="score-box" id="fashion-points">+0</div>
            <p style="font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 2px;">Fashion Points</p>
            <button class="btn-play" style="margin-top: 40px; width: 100%;" onclick="closeModal()">Coletar</button>
        </div>
    </div>

    <script>
        // Game Engine Logic
        const state = {
            points: parseInt(localStorage.getItem('pop_star_points')) || 100,
            look: { hair: null, dress: null, shoes: null, acc: null },
            tab: 'hair'
        };

        const db = {
            hair: [
                { id: 'h1', name: 'Pink Wavy', src: 'assets/hair_pink.png', price: 0 },
                { id: 'h2', name: 'Golden Long', src: 'assets/hair_blonde.png', price: 60 },
                { id: 'h3', name: 'Black Bun', src: 'https://via.placeholder.com/400x600/333/eee?text=Coque+Chic', price: 100 },
                { id: 'h4', name: 'Lilac Flow', src: 'https://via.placeholder.com/400x600/E6E6FA/333?text=Lilac', price: 150 }
            ],
            dress: [
                { id: 'd1', name: 'Ruby Gown', src: 'assets/dress_glamour.png', price: 0 },
                { id: 'd2', name: 'Azure Dream', src: 'https://via.placeholder.com/400x600/40E0D0/fff?text=Azure', price: 180 },
                { id: 'd3', name: 'Night Sparkle', src: 'https://via.placeholder.com/400x600/4B0082/fff?text=Night', price: 250 },
                { id: 'd4', name: 'Summer Mint', src: 'https://via.placeholder.com/400x600/b9f2ff/333?text=Mint', price: 120 }
            ],
            shoes: [
                { id: 's1', name: 'Glass Heels', src: 'https://via.placeholder.com/400x600/eee/333?text=Glass', price: 0 },
                { id: 's2', name: 'Golden Steps', src: 'https://via.placeholder.com/400x600/FFD700/333?text=Gold', price: 200 }
            ],
            acc: [
                { id: 'a1', name: 'Crystal Tiara', src: 'https://via.placeholder.com/400x600/fff/333?text=Tiara', price: 300 },
                { id: 'a2', name: 'Bling Shades', src: 'https://via.placeholder.com/400x600/000/fff?text=Shades', price: 90 }
            ]
        };

        function updateUI() {
            document.getElementById('score-display').innerText = state.points;
            localStorage.setItem('pop_star_points', state.points);
        }

        function changeScene(s) {
            document.querySelectorAll('.scene').forEach(sc => sc.classList.remove('active'));
            const target = document.getElementById(s);
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
            if(s === 'scene-closet') renderGrid();
        }

        function switchTab(t) {
            state.tab = t;
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            db[state.tab].forEach(item => {
                const card = document.createElement('div');
                card.className = `item-card ${state.points < item.price ? 'locked' : ''} ${state.look[state.tab] === item.id ? 'selected' : ''}`;
                card.onclick = () => equip(item);
                card.innerHTML = `<img src="${item.src}"><div class="item-price">${item.price > 0 ? item.price + ' ✨' : 'GRÁTIS'}</div>`;
                grid.appendChild(card);
            });
        }

        function equip(item) {
            if (state.points < item.price) {
                alert('Você precisa de mais pontos fashion! ✨');
                return;
            }
            state.look[state.tab] = item.id;
            const layer = document.getElementById(`layer-${state.tab}`);
            layer.src = item.src;
            layer.style.display = 'block';
            renderGrid();
        }

        function randomizeLook() {
            for (const cat in db) {
                const affordable = db[cat].filter(i => i.price <= state.points);
                const rand = affordable[Math.floor(Math.random() * affordable.length)];
                state.look[cat] = rand.id;
                const layer = document.getElementById(`layer-${cat}`);
                layer.src = rand.src;
                layer.style.display = 'block';
            }
            renderGrid();
        }

        function clearLook() {
            for (const cat in state.look) {
                state.look[cat] = null;
                document.getElementById(`layer-${cat}`).style.display = 'none';
            }
            renderGrid();
        }

        function finalizeLook() {
            const canvas = document.getElementById('photo-canvas');
            const avatar = document.getElementById('closet-avatar');
            const prev = canvas.querySelector('.avatar-container');
            if (prev) prev.remove();
            canvas.appendChild(avatar.cloneNode(true));
            changeScene('scene-photo');
        }

        function postLook() {
            const reward = Math.floor(Math.random() * 201) + 80;
            state.points += reward;
            updateUI();
            document.getElementById('fashion-points').innerText = `+${reward}`;
            document.getElementById('modal-reward').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-reward').style.display = 'none';
            changeScene('scene-closet');
        }

        updateUI();
    </script>
</body>
</html>
