<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Star | Fashion Dress-Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcce5;
            --primary-dark: #ff99cc;
            --secondary: #e5ccff;
            --accent: #ccffff;
            --gold: #ffd700;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            width: 100%;
            max-width: 1200px;
            height: 95vh;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            align-items: center;
            background: var(--glass);
            padding: 12px 24px;
            border-radius: 35px;
            box-shadow: var(--shadow);
            font-weight: 800;
            color: var(--dark);
            border: 2px solid white;
        }

        .coin-icon {
            color: var(--gold);
            margin-right: 12px;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4));
        }

        /* Scenes */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scene.active {
            display: flex;
            opacity: 1;
        }

        /* Menu Scene */
        #scene-menu {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('assets/background.png') center/cover no-repeat;
        }

        .title-card {
            background: var(--glass);
            padding: 60px 80px;
            border-radius: 60px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: float 5s ease-in-out infinite;
            border: 1px solid white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(2deg); }
        }

        h1 {
            font-size: 6rem;
            background: linear-gradient(135deg, #ff4d94, #9933ff, #4d94ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: -4px;
            font-weight: 900;
            line-height: 1;
        }

        .btn-play {
            padding: 22px 70px;
            font-size: 1.6rem;
            color: white;
            background: linear-gradient(135deg, #ff99cc, #cc99ff);
            border: none;
            border-radius: 45px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 800;
            box-shadow: 0 15px 40px rgba(255, 153, 204, 0.6);
            text-transform: uppercase;
        }

        .btn-play:hover {
            transform: scale(1.1) rotate(-1deg);
            box-shadow: 0 20px 50px rgba(255, 102, 178, 0.7);
        }

        /* Closet Scene */
        #scene-closet {
            flex-direction: row;
        }

        .closet-left {
            flex: 1.5;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 85%);
            padding: 40px;
        }

        .avatar-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .avatar-layer {
            position: absolute;
            max-width: 95%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar-layer.equipping {
            animation: equipEffect 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes equipEffect {
            0% { transform: scale(1.2) translateY(-20px); opacity: 0; filter: brightness(2) blur(10px); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: brightness(1) blur(0); }
        }

        .closet-right {
            width: 500px;
            background: var(--glass);
            border-left: 2px solid white;
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 50px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            padding: 25px;
            gap: 12px;
            background: rgba(255, 255, 255, 0.3);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 16px 28px;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: 800;
            border-radius: 22px;
            transition: all 0.3s;
            font-size: 0.95rem;
            white-space: nowrap;
            color: #999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .tab.active {
            background: var(--primary-dark);
            color: white;
            box-shadow: 0 12px 25px rgba(255, 153, 204, 0.4);
            transform: translateY(-4px);
            border-color: transparent;
        }

        .inventory-grid {
            flex: 1;
            padding: 35px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            overflow-y: auto;
            align-content: start;
        }

        .item-card {
            background: white;
            border-radius: 30px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid transparent;
            position: relative;
            padding: 15px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.06);
        }

        .item-card:hover {
            transform: translateY(-10px) scale(1.1);
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
        }

        .item-card.selected {
            border-color: var(--primary-dark);
            background: #fffcfd;
        }

        .item-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .item-card.locked::after {
            content: '💎';
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.1rem;
        }

        .item-card.locked img {
            filter: grayscale(1) opacity(0.5);
        }

        .item-price {
            font-size: 1rem;
            font-weight: 800;
            color: var(--gold);
            margin-top: 8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .action-bar {
            display: flex;
            padding: 0 35px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 14px;
            border-radius: 18px;
            border: 2px solid white;
            background: white;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .btn-action:hover { background: #fefefe; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .closet-footer {
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-finish {
            width: 100%;
            padding: 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg, #9933ff, #ff66b2);
            color: white;
            font-weight: 900;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 20px 40px rgba(255, 102, 178, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-finish:hover {
            box-shadow: 0 25px 50px rgba(255, 102, 178, 0.6);
            transform: scale(1.03) translateY(-2px);
        }

        /* Photo Scene */
        #scene-photo {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .photo-wrapper {
            position: relative;
            padding: 50px;
            background: #fff;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            border-radius: 50px;
            border: 5px solid #f9f9f9;
        }

        .photo-canvas {
            width: 550px;
            height: 750px;
            background: linear-gradient(135deg, #fff5f8 0%, #f3e5f5 100%);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 12px solid white;
        }

        .social-ui {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            gap: 30px;
            z-index: 1000;
        }

        .social-btn {
            background: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            transition: all 0.3s;
            cursor: pointer;
        }
        .social-btn:hover { transform: scale(1.2) rotate(10deg); }

        .btn-post {
            margin-top: 50px;
            padding: 24px 120px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 900;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-post:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* Modal */
        #modal-reward {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 70px;
            border-radius: 60px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            animation: bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 50px 120px rgba(0,0,0,0.5);
        }

        @keyframes bounceIn {
            from { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            to { transform: scale(1); opacity: 1; }
        }

        .score-box {
            font-size: 6rem;
            font-weight: 1000;
            color: #ff3385;
            margin: 30px 0;
            text-shadow: 5px 5px 0 rgba(255, 153, 204, 0.2);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            #game-container { border-radius: 0; height: 100vh; max-height: none; }
            .closet-right { width: 450px; }
        }

        @media (max-width: 850px) {
            #scene-closet { flex-direction: column; }
            .closet-left { height: 55%; padding: 20px; }
            .closet-right {
                width: 100%;
                height: 45%;
                border-left: none;
                border-top: 2px solid white;
            }
            .inventory-grid { grid-template-columns: repeat(4, 1fr); padding: 20px; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <span class="coin-icon">✨</span>
            <span id="score-display">100</span>
        </div>

        <!-- Menu Scene -->
        <div id="scene-menu" class="scene active">
            <div class="title-card">
                <h1>Pop Star</h1>
                <p style="margin-bottom: 40px; font-weight: 700; font-size: 1.3rem; color: #555; letter-spacing: 0.5px;">Vista a sua personagem para o sucesso mundial!</p>
                <button class="btn-play" onclick="changeScene('scene-closet')">Entrar no Closet</button>
            </div>
        </div>

        <!-- Closet Scene -->
        <div id="scene-closet" class="scene">
            <div class="closet-left">
                <div class="avatar-container" id="closet-avatar">
                    <!-- Doll Base -->
                    <img src="assets/avatar_base.png" class="avatar-layer" style="z-index: 1;" id="base-body">
                    
                    <!-- Dressing Layers -->
                    <img id="layer-shoes" src="" class="avatar-layer" style="z-index: 3; display:none;">
                    <img id="layer-dress" src="" class="avatar-layer" style="z-index: 5; display:none;">
                    <img id="layer-hair" src="" class="avatar-layer" style="z-index: 10; display:none;">
                    <img id="layer-acc" src="" class="avatar-layer" style="z-index: 15; display:none;">
                    
                    <!-- Sparkle / Poof Effect Layer -->
                    <div id="equip-vfx" style="position:absolute; width:100%; height:100%; z-index:100; pointer-events:none;"></div>
                </div>
            </div>
            <div class="closet-right">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('hair')">CABELO</button>
                    <button class="tab" onclick="switchTab('dress')">VESTIDOS</button>
                    <button class="tab" onclick="switchTab('shoes')">SAPATOS</button>
                    <button class="tab" onclick="switchTab('acc')">BODY ACC</button>
                </div>
                
                <div class="inventory-grid" id="inventory-grid"></div>

                <div class="action-bar">
                    <button class="btn-action" onclick="randomizeLook()">🎲 Aleatório</button>
                    <button class="btn-action" onclick="clearLook()">🔄 Limpar</button>
                </div>

                <div class="closet-footer">
                    <button class="btn-finish" onclick="finalizeLook()">Finalizar Look</button>
                </div>
            </div>
        </div>

        <!-- Photo Scene -->
        <div id="scene-photo" class="scene">
            <div class="photo-wrapper">
                <div class="photo-canvas" id="photo-canvas">
                    <!-- Photo Content Injected by JS -->
                    <div class="social-ui">
                        <div class="social-btn">💖</div>
                        <div class="social-btn">💬</div>
                        <div class="social-btn">✨</div>
                    </div>
                </div>
            </div>
            <button class="btn-post" onclick="postLook()">Publicar na Web</button>
            <button class="btn-back" onclick="changeScene('scene-closet')" style="margin-top: 15px; background: transparent; border: none; cursor: pointer; color: #999; font-weight: 800; text-transform: uppercase;">Ajustar Estilo</button>
        </div>
    </div>

    <!-- Reward Modal -->
    <div id="modal-reward">
        <div class="modal-content">
            <h2 style="font-size: 3rem; margin-bottom: 10px;">Sucesso Viral! 🚀</h2>
            <p style="color: #666; font-size: 1.3rem;">O mundo parou para ver seu estilo.</p>
            <div class="score-box" id="fashion-points">+0</div>
            <p style="font-weight: 900; color: #333; text-transform: uppercase; letter-spacing: 3px;">Fashion Points</p>
            <button class="btn-play" style="margin-top: 45px; width: 100%;" onclick="closeModal()">Continuar</button>
        </div>
    </div>

    <script>
        const state = {
            points: parseInt(localStorage.getItem('pop_star_points')) || 100,
            look: { hair: null, dress: null, shoes: null, acc: null },
            tab: 'hair'
        };

        const db = {
            hair: [
                { id: 'h1', name: 'Wave Pink', src: 'assets/hair_pink.png', price: 0 },
                { id: 'h2', name: 'Golden Sun', src: 'assets/hair_blonde.png', price: 60 },
                { id: 'h3', name: 'Black Velvet', src: 'https://via.placeholder.com/600x800/222/fff?text=Cabelo+Escuro', price: 100 },
                { id: 'h4', name: 'Neon Blue', src: 'https://via.placeholder.com/600x800/00ffff/333?text=Neon+Blue', price: 200 }
            ],
            dress: [
                { id: 'd1', name: 'Silver Gown', src: 'assets/dress_glamour.png', price: 0 },
                { id: 'd2', name: 'Sunset Sparkle', src: 'https://via.placeholder.com/600x800/FF7F50/fff?text=Vestido+Longo', price: 180 },
                { id: 'd3', name: 'Night Queen', src: 'https://via.placeholder.com/600x800/4B0082/fff?text=Dark+Gown', price: 250 },
                { id: 'd4', name: 'Gold Leaf', src: 'https://via.placeholder.com/600x800/FFD700/333?text=Ouro+Puro', price: 400 }
            ],
            shoes: [
                { id: 's1', name: 'Glass Heels', src: 'https://via.placeholder.com/600x800/eee/333?text=Salto+Prata', price: 0 },
                { id: 's2', name: 'Pink Diamond', src: 'https://via.placeholder.com/600x800/FF69B4/fff?text=Rose+Heels', price: 120 },
                { id: 's3', name: 'Gold Majesty', src: 'https://via.placeholder.com/600x800/FFD700/333?text=Gold+Heels', price: 300 }
            ],
            acc: [
                { id: 'a1', name: 'Crown', src: 'https://via.placeholder.com/600x800/fff/333?text=Coroa', price: 500 },
                { id: 'a2', name: 'Wings', src: 'https://via.placeholder.com/600x800/ccccff/333?text=Asas', price: 250 }
            ]
        };

        function updateUI() {
            document.getElementById('score-display').innerText = state.points;
            localStorage.setItem('pop_star_points', state.points);
        }

        function changeScene(s) {
            document.querySelectorAll('.scene').forEach(sc => {
                sc.classList.remove('active');
                sc.style.display = 'none';
            });
            const target = document.getElementById(s);
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
            if(s === 'scene-closet') renderGrid();
        }

        function switchTab(t) {
            state.tab = t;
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            db[state.tab].forEach(item => {
                const card = document.createElement('div');
                card.className = `item-card ${state.points < item.price ? 'locked' : ''} ${state.look[state.tab] === item.id ? 'selected' : ''}`;
                card.onclick = () => equip(item);
                card.innerHTML = `<img src="${item.src}"><div class="item-price">${item.price > 0 ? item.price + ' ✨' : 'GRÁTIS'}</div>`;
                grid.appendChild(card);
            });
        }

        function equip(item) {
            if (state.points < item.price) {
                alert('Você precisa de mais pontos fashion! ✨');
                return;
            }
            state.look[state.tab] = item.id;
            const layer = document.getElementById(`layer-${state.tab}`);
            
            // Visual Effect
            layer.classList.remove('equipping');
            void layer.offsetWidth; // Reset animation
            layer.src = item.src;
            layer.style.display = 'block';
            layer.classList.add('equipping');
            
            renderGrid();
        }

        function randomizeLook() {
            for (const cat in db) {
                const affordable = db[cat].filter(i => i.price <= state.points);
                const rand = affordable[Math.floor(Math.random() * affordable.length)];
                state.look[cat] = rand.id;
                const layer = document.getElementById(`layer-${cat}`);
                layer.src = rand.src;
                layer.style.display = 'block';
            }
            renderGrid();
        }

        function clearLook() {
            for (const cat in state.look) {
                state.look[cat] = null;
                document.getElementById(`layer-${cat}`).style.display = 'none';
            }
            renderGrid();
        }

        function finalizeLook() {
            const canvas = document.getElementById('photo-canvas');
            const avatar = document.getElementById('closet-avatar');
            const prev = canvas.querySelector('.avatar-container');
            if (prev) prev.remove();
            
            const clone = avatar.cloneNode(true);
            clone.style.transform = 'scale(0.9)'; // Fit slightly better in photo
            canvas.appendChild(clone);
            changeScene('scene-photo');
        }

        function postLook() {
            const reward = Math.floor(Math.random() * 250) + 100;
            state.points += reward;
            updateUI();
            document.getElementById('fashion-points').innerText = `+${reward}`;
            document.getElementById('modal-reward').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-reward').style.display = 'none';
            changeScene('scene-closet');
        }

        updateUI();
    </script>
</body>
</html>
