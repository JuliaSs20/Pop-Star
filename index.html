<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Star Royale AI | Detector de Realidade</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
    <style>
        :root { --primary: #ff3385; --secondary: #9933ff; --bg: #fdfafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #fce4ec; color: #1a1a1a; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; padding: 20px 8%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 2000; border-bottom: 2px solid white; }
        .logo { font-size: 2.2rem; font-weight: 900; background: linear-gradient(to right, #ff4c94, #9933ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; gap: 40px; }
        nav a { text-decoration: none; color: #666; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .page { min-height: 100vh; display: none; padding-top: 100px; }
        .page.active { display: block; }
        #page-home { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .btn-cta { padding: 25px 80px; background: #1a1a1a; color: white; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; }
        .scanner-layout { max-width: 900px; margin: 50px auto; background: white; padding: 60px; border-radius: 60px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center; }
        .upload-area { width: 100%; height: 400px; background: #fafafa; border-radius: 40px; border: 3px dashed #eee; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #preview-img { max-height: 100%; display: none; }
        .laser { position: absolute; top: 0; width: 100%; height: 5px; background: var(--primary); display: none; animation: moveLaser 2s infinite; }
        @keyframes moveLaser { 0% { top: 0; } 100% { top: 100%; } }
        .verdict { font-size: 2rem; font-weight: 900; margin-top: 20px; }
        .ai { color: #9933ff; } .human { color: #2ecc71; }
    </style>
</head>
<body>
    <header>
        <div class="logo">POP STAR Royale AI</div>
        <nav> <a onclick="go('home')">Home</a> <a onclick="go('scanner')">Scanner</a> <a onclick="go('studio')">Estúdio</a> </nav>
    </header>
    <main id="page-home" class="page active">
        <h1>Detector de Realidade AI</h1>
        <button class="btn-cta" onclick="go('scanner')">Começar Scanner</button>
    </main>
    <section id="page-scanner" class="page">
        <div class="scanner-layout">
            <h2>Anexe uma Imagem</h2>
            <div class="upload-area" onclick="document.getElementById('file').click()">
                <div id="hint">CLIQUE PARA ANEXAR</div>
                <img id="preview-img">
                <div class="laser" id="laser"></div>
            </div>
            <input type="file" id="file" style="display:none;" onchange="scan(event)">
            <div id="res" style="display:none; margin-top:30px;">
                <div id="verdict" class="verdict"></div>
                <button class="btn-cta" style="margin-top:20px;" onclick="location.reload()">Novo Scan</button>
            </div>
        </div>
    </section>
    <script>
        function go(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }
        function scan(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (v) => {
                const img = document.getElementById('preview-img');
                img.src = v.target.result; img.style.display = 'block';
                document.getElementById('hint').style.display = 'none';
                document.getElementById('laser').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('laser').style.display = 'none';
                    document.getElementById('res').style.display = 'block';
                    const isAI = Math.random() > 0.5;
                    const v = document.getElementById('verdict');
                    v.innerText = isAI ? "🤖 PESSOA GERADA POR IA" : "👥 PESSOA REAL";
                    v.className = "verdict " + (isAI ? "ai" : "human");
                }, 2000);
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
